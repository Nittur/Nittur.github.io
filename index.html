<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ============================================
         META TAGS - Essential information for browsers
         ============================================ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pavan's personal space - a blend of optimistic futurism and zen">
    <title>Pavan's Page</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
</head>

<body class="home-page">
    <!-- ============================================
         DECORATIVE BACKGROUND ELEMENTS
         Floating shapes + Japanese wave pattern
         ============================================ -->
    <div class="bg-decoration">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        
        <!-- Japanese wave pattern (seigaiha) at bottom -->
        <div class="wave-pattern"></div>
    </div>

    <!-- ============================================
         NAVIGATION BAR
         ============================================ -->
    <nav class="main-nav">
        <!-- Logo with Torii Gate symbol (⛩) - Japanese cultural icon -->
        <a href="index.html" class="nav-logo">
            <span class="logo-symbol">⛩</span>
            <span class="logo-text">Its me</span>
        </a>
        
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="blogs.html">Blog</a></li>
        </ul>
    </nav>

    <!-- ============================================
         BENTO GRID — 4 cols × 3 rows on desktop
                       2 cols × 3 rows on mobile
         ============================================ -->
    <main class="bento-grid">

        <!-- ── Hero tile (col 1-2, row 1-2) ── -->
        <div class="bento-tile tile-hero">
            <span class="cherry-blossom">✿</span>
            <h1 class="hero-title">
                Welcome to my
                <span class="gradient-text">Digital Garden</span>
            </h1>
            <p class="hero-subtitle">
                <span class="retro-text">exploring ideas, one day at a time</span>
            </p>
            <p class="about-text-compact">
                If interested to discuss, mail me.
            </p>
        </div>

        <!-- ── GIF tile (col 3-4, row 1-2) ── -->
        <!-- TO CHANGE THE GIF: replace the src URL below -->
        <div class="bento-tile tile-gif">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <img
                src="assets/cogito_ergo_sum.png"
                alt="Welcome image"
                class="welcome-gif"
                loading="lazy"
            >
            <p class="meme-caption">welcome</p>
        </div>

        <!-- ── About tile (col 1, row 3) ── -->
        <div class="bento-tile tile-about">
            <span class="tile-icon">👾</span>
            <span class="tile-label retro-text">// who i am</span>
            <p class="tile-body">CS student. Eternal thinker. Loves to ideate and build.</p>
        </div>

        <!-- ── Blog tile (col 2, row 3) ── -->
        <a href="blogs.html" class="bento-tile tile-blog">
            <span class="tile-icon">✍️</span>
            <span class="tile-label">Blog</span>
            <span class="tile-arrow">→</span>
        </a>

        <!-- ── Reviews tile (col 3, row 3) ── -->
        <a href="reviews.html" class="bento-tile tile-reviews">
            <span class="tile-icon">⭐</span>
            <span class="tile-label">Reviews</span>
            <span class="tile-arrow">→</span>
        </a>

        <!-- ── Footer tile (col 4, row 3) ── -->
        <div class="bento-tile tile-footer">
            <span class="retro-text">2026</span>
            <span class="footer-symbol">◈</span>
            <span class="retro-text">made with AI</span>
        </div>

    </main>

</body>
</html>
